name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Integration tests
        env:
          COMPANYCAM_API_KEY: ${{ secrets.COMPANYCAM_API_KEY }}
          COMPANYCAM_TEST_PROJECT_ID: ${{ secrets.COMPANYCAM_TEST_PROJECT_ID }}
        run: ./test-integration.sh
      - name: Package dry-run
        run: npm pack --dry-run
